services:
  - type: web
    name: bikehubb-api
    env: docker
    plan: free
    # Render usa Dockerfile automaticamente para Java (não suportado nativamente)
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
