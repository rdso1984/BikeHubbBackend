services:
  - type: web
    name: bikehubb-api
    env: java
    runtime: java
    plan: free
    # IMPORTANTE: Não usar Docker - usar buildpack nativo
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/bikehubb-*.jar --spring.profiles.active=render
    # Força uso do buildpack Heroku em vez de Docker
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: PORT
        value: 8080
